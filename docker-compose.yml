version: '3.8'

services:
  url-shortener:
    build: .
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - NODE_ENV=production
      - BASE_URL=http://localhost:3000
      - LOG_LEVEL=info
      - ENABLE_SWAGGER=true
      - JWT_SECRET=${JWT_SECRET:-your_super_secret_key_change_this}
      - API_KEYS=${API_KEYS:-key1:secret1}
    volumes:
      - ./logs:/app/logs
      - ./database.sqlite:/app/database.sqlite
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (r) => {if (r.statusCode !== 200) throw new Error(r.statusCode)})"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
